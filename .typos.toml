# Typos configuration for Aegis Theme
# https://github.com/crate-ci/typos

[files]
extend-exclude = [
    "vendor/",
    "node_modules/",
    "assets/",
    "src/*/css/",
    "src/*/js/",
    "src/Admin/build/",
    "src/Blocks/editor/",
    "*.min.js",
    "*.min.css",
    "*.asset.php",
    "*.js.map",
    "*.css.map",
    "*.lock",
    "languages/*.po",
    "languages/*.mo",
]

[default]
extend-ignore-identifiers-re = [
    # WordPress-specific terms
    "wpdb",
    "wptrt",
    "phpcs",
    "WPCS",
]
extend-ignore-re = [
    # Generated icon IDs in pattern markup (e.g. icon-690b811a92ba1)
    "icon-[0-9a-f]+",
]

[default.extend-words]
# WordPress/PHP common terms that aren't typos
aci = "aci"
ser = "ser"
# Proper nouns used in pattern demo content
Calle = "Calle"
Mena = "Mena"
