# GitHub Labels Configuration for Aegis Theme
# 
# Reference: This file documents the labels used in the Aegis repository.
# Labels can be created and managed via:
# 1. GitHub UI: Settings → Labels
# 2. GitHub CLI: gh label create --name "label-name" --description "description" --color "color"
# 3. Actions: github/issue-labeler or similar automation

# ---
# TYPE LABELS (Issue/PR classification)
# ---

