# ---
# NOTES FOR MANAGEMENT
# ---
# 
# ## Creating Labels via GitHub CLI:
# ```bash
# gh label create "[Type] Bug" --description "Something is not working" --color "d73a4a"
# ```
#
# ## Automated Labeling:
# - Consider using GitHub Actions for auto-labeling based on:
#   - File changes (e.g., src/Blocks/ → [Area] Blocks)
#   - Issue content (keywords in description)
#   - Issue templates (auto-add based on template used)
#
# ## Label Workflow:
# 1. Issues are created with type label (via template) + triage label
# 2. Triage/review team adds priority + area labels
# 3. Once assigned, status changes: backlog → in-progress → review → ready
# 4. Stale workflow auto-tags inactive issues
#
# ## Color Reference:
# - Red (#d73a4a, #b60205): Bug, Critical, Urgent
# - Yellow (#fbca04): Medium priority, Performance
# - Blue (#0075ca, #1d76db): Feature, Docs, CI/CD
# - Green (#0e8a16, #c2e0c6): Ready, Good first issue
# - Purple (#5319e7, #7057ff): Epic, Help wanted
