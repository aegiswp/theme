# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Dependabot Auto-Merge

on:
  pull_request:
    paths:
      - 'composer.lock'
      - 'package-lock.json'

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Parse Dependabot PR Title
        id: parse
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Extract version bump type from title (e.g., "Bump @wordpress/plugins from 4.0.0 to 5.0.0")
          if [[ "$PR_TITLE" =~ from\ ([0-9.]+)\ to\ ([0-9.]+) ]]; then
            FROM_VERSION="${BASH_REMATCH[1]}"
            TO_VERSION="${BASH_REMATCH[2]}"

            # Parse version numbers
            FROM_MAJOR=$(echo "$FROM_VERSION" | cut -d. -f1)
            TO_MAJOR=$(echo "$TO_VERSION" | cut -d. -f1)

            FROM_MINOR=$(echo "$FROM_VERSION" | cut -d. -f2)
            TO_MINOR=$(echo "$TO_VERSION" | cut -d. -f2)

            # Determine bump type
            if [ "$FROM_MAJOR" != "$TO_MAJOR" ]; then
              BUMP_TYPE="major"
            elif [ "$FROM_MINOR" != "$TO_MINOR" ]; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi

            echo "from_version=$FROM_VERSION" >> $GITHUB_OUTPUT
            echo "to_version=$TO_VERSION" >> $GITHUB_OUTPUT
            echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
            echo "PR auto-merge: $BUMP_TYPE ($FROM_VERSION → $TO_VERSION)"
          else
            echo "bump_type=unknown" >> $GITHUB_OUTPUT
            echo "Could not parse version from PR title"
          fi

      - name: Enable auto-merge for patch and minor updates
        if: steps.parse.outputs.bump_type != 'major' && steps.parse.outputs.bump_type != 'unknown'
        run: |
          echo "✓ Auto-merging ${{ steps.parse.outputs.bump_type }} update"
          echo "  ${{ steps.parse.outputs.from_version }} → ${{ steps.parse.outputs.to_version }}"

      - name: Approve Pull Request
        if: steps.parse.outputs.bump_type != 'major' && steps.parse.outputs.bump_type != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: 'Auto-approved: ${{ steps.parse.outputs.bump_type }} dependency update'
            })

      - name: Enable Auto-Merge (Squash)
        if: steps.parse.outputs.bump_type != 'major' && steps.parse.outputs.bump_type != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            })

      - name: Skip auto-merge for major updates
        if: steps.parse.outputs.bump_type == 'major'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ Major version update detected. This PR requires manual review before merging.\n\n**${{ steps.parse.outputs.from_version }}** → **${{ steps.parse.outputs.to_version }}**\n\nPlease review the changelog and breaking changes before approving.'
            })
