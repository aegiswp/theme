# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Dependabot Auto-Merge

on:
  pull_request:
    paths:
      - 'composer.lock'
      - 'package-lock.json'

permissions:
  pull-requests: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Parse Dependabot PR Title
        id: parse
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Extract version bump type from title (e.g., "Bump @wordpress/plugins from 4.0.0 to 5.0.0")
          if [[ "$PR_TITLE" =~ from\ ([0-9.]+)\ to\ ([0-9.]+) ]]; then
            FROM_VERSION="${BASH_REMATCH[1]}"
            TO_VERSION="${BASH_REMATCH[2]}"

            # Parse version numbers
            FROM_MAJOR=$(echo "$FROM_VERSION" | cut -d. -f1)
            TO_MAJOR=$(echo "$TO_VERSION" | cut -d. -f1)

            FROM_MINOR=$(echo "$FROM_VERSION" | cut -d. -f2)
            TO_MINOR=$(echo "$TO_VERSION" | cut -d. -f2)

            # Determine bump type
            if [ "$FROM_MAJOR" != "$TO_MAJOR" ]; then
              BUMP_TYPE="major"
            elif [ "$FROM_MINOR" != "$TO_MINOR" ]; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi

            echo "from_version=$FROM_VERSION" >> $GITHUB_OUTPUT
            echo "to_version=$TO_VERSION" >> $GITHUB_OUTPUT
            echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
            echo "PR auto-merge: $BUMP_TYPE ($FROM_VERSION → $TO_VERSION)"
          else
            echo "bump_type=unknown" >> $GITHUB_OUTPUT
            echo "Could not parse version from PR title"
          fi

      - name: Approve and enable auto-merge for patch and minor updates
        if: steps.parse.outputs.bump_type != 'major' && steps.parse.outputs.bump_type != 'unknown'
        uses: actions/github-script@v7
        with:
          script: |
            const bumpType = '${{ steps.parse.outputs.bump_type }}';
            const fromVersion = '${{ steps.parse.outputs.from_version }}';
            const toVersion = '${{ steps.parse.outputs.to_version }}';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: `Auto-approved: ${bumpType} dependency update (${fromVersion} → ${toVersion})`
            });

            await github.graphql(
              `mutation ($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest {
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }`,
              {
                pullRequestId: context.payload.pull_request.node_id
              }
            );

            console.log(`✓ Enabled auto-merge for ${bumpType} update (${fromVersion} → ${toVersion})`);

      - name: Skip auto-merge for major updates
        if: steps.parse.outputs.bump_type == 'major'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ Major version update detected. This PR requires manual review before merging.\n\n**${{ steps.parse.outputs.from_version }}** → **${{ steps.parse.outputs.to_version }}**\n\nPlease review the changelog and breaking changes before approving.'
            })
