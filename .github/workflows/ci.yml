# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-lint-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      # Linting ensures theme.json and JS follow standards
      - name: Lint JS/TS & CSS
        run: |
          npm run lint:js --if-present
          npm run lint:css --if-present
          npm run lint:pkg-json --if-present

      - name: Build theme
        run: npm run build --if-present

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, dom, curl, json, libxml, xml, xmlwriter
          tools: composer, phpcs
          coverage: pcov

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      # PHPCS for theme PHP files and integrated audit tool
      - name: PHPCS (WordPress Coding Standards)
        run: vendor/bin/phpcs

      # Unit tests for integrated audit tool
      - name: Run PHP Unit tests
        run: |
          if [ -f phpunit.xml ]; then
            vendor/bin/phpunit --testsuite unit --coverage-clover coverage.xml
          fi

      # aegis/wpaudit — path repo tools/wpaudit; tracked in git (see .gitignore exception).
      - name: WPAudit (aegis/wpaudit) unit tests
        run: |
          if [ ! -f tools/wpaudit/composer.json ]; then
            echo "::error::tools/wpaudit is missing. It must be committed so CI can run aegis/wpaudit (dev dependency). Un-ignore it in .gitignore and add the directory."
            exit 1
          fi
          composer install --no-interaction --no-progress --working-dir=tools/wpaudit
          tools/wpaudit/vendor/bin/phpunit -c tools/wpaudit/phpunit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  theme-validation:
    name: Theme Validation
    runs-on: ubuntu-latest
    needs: build-lint-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build theme
        run: npm run build --if-present

      - name: Validate theme.json
        run: |
          if [ -f "theme.json" ]; then
            node -e "
              const fs = require('fs');
              const json = fs.readFileSync('theme.json', 'utf8');
              try {
                JSON.parse(json);
                console.log('✓ theme.json is valid JSON');
              } catch (e) {
                console.error('✗ Invalid JSON in theme.json:', e.message);
                process.exit(1);
              }
            "
          fi

      - name: Check required theme files
        run: |
          required_files=("style.css" "index.php" "functions.php" "theme.json")
          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
            fi
          done
          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "✗ Missing required files: ${missing_files[*]}"
            exit 1
          fi
          echo "✓ All required theme files present"