# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Development Checks

on:
  push:
    branches: [ dev, feature/* ]
  pull_request:
    branches: [ dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    name: Quick Development Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Quick lint check
        run: |
          npm run lint:js --if-present
          npm run lint:css --if-present
          npm run lint:pkg-json --if-present

      - name: Check build
        run: npm run build --if-present

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, dom, curl, json, libxml, xml, xmlwriter
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP syntax check
        run: find src -name "*.php" -exec php -l {} \;

      - name: PHPCS quick check
        run: vendor/bin/phpcs --report=summary --warning-severity=0

  theme-validation:
    name: Theme Validation
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build theme
        run: npm run build --if-present

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Validate theme.json
        run: |
          if [ -f "theme.json" ]; then
            php -r "
              \$json = file_get_contents('theme.json');
              \$data = json_decode(\$json, true);
              if (json_last_error() !== JSON_ERROR_NONE) {
                echo 'Invalid JSON in theme.json: ' . json_last_error_msg() . PHP_EOL;
                exit(1);
              }
              echo 'theme.json is valid JSON' . PHP_EOL;
            "
          fi

      - name: Check required files
        run: |
          required_files=("style.css" "index.php" "functions.php" "theme.json")
          missing_files=()
          for file in "\${required_files[@]}"; do
            if [ ! -f "\$file" ]; then
              missing_files+=("\$file")
            fi
          done
          if [ \${#missing_files[@]} -gt 0 ]; then
            echo "Missing required files: \${missing_files[*]}"
            exit 1
          fi
          echo "All required theme files present"
