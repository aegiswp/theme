# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Development Checks

on:
  push:
    branches: [ dev, feature/* ]
  pull_request:
    branches: [ dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    name: Quick Development Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Quick lint check
        run: |
          npm run lint:js --if-present
          npm run lint:css --if-present
          npm run lint:pkg-json --if-present

      - name: Check build
        run: npm run build --if-present

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, dom, curl, json, libxml, xml, xmlwriter
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP syntax check
        run: |
          find . -name "*.php" ! -path "./vendor/*" ! -path "./node_modules/*" -exec php -l {} \;

      - name: PHPCS quick check (errors only)
        run: vendor/bin/phpcs --report=summary --warning-severity=0

      - name: Run PHP unit tests
        run: composer test:php --if-present

  audit-tool-tests:
    name: Audit Tool Tests
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run all audit tool tests
        run: composer test:wpaudit --if-present
