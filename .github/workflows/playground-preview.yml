# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Playground Preview

on:
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Generate Preview Link
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Preview URL
        id: preview
        run: |
          BLUEPRINT=$(cat <<'EOF'
          {
            "$schema": "https://playground.wordpress.net/blueprint-schema.json",
            "landingPage": "/wp-admin/site-editor.php",
            "preferredPhpVersion": "8.3",
            "steps": [
              {
                "step": "login",
                "username": "admin",
                "password": "password"
              },
              {
                "step": "installTheme",
                "themeZipFile": {
                  "resource": "url",
                  "url": "https://github.com/${{ github.repository }}/archive/${{ github.event.pull_request.head.sha }}.zip"
                }
              },
              {
                "step": "activateTheme",
                "themeSlug": "aegis"
              }
            ]
          }
          EOF
          )
          ENCODED=$(echo "$BLUEPRINT" | python3 -c "import sys,urllib.parse;print(urllib.parse.quote(sys.stdin.read()))")
          echo "url=https://playground.wordpress.net/#${ENCODED}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            ### Aegis Live Preview
            A live preview of this PR is ready for testing!
            
            [**Launch WordPress Playground**](${{ steps.preview.outputs.url }})
            
            *Note: This environment is temporary and runs entirely in your browser.*
          comment_tag: playground-preview