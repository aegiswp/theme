# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Release Aegis Theme

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install gettext rsync -y

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Block Assets
        run: npm run build --if-present

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction

      # Automatically compile .po to .mo
      - name: Compile Translations
        run: |
          mkdir -p languages
          for po in languages/*.po; do
            if [ -f "$po" ]; then
              msgfmt "$po" -o "${po%.po}.mo"
            fi
          done

      - name: Package theme (installable build only)
        id: package_theme
        run: |
          THEME_SLUG="aegis"
          mkdir -p "$THEME_SLUG"
          # Excludes: .distignore (dev deps, tests, sources, Node, CI, etc.).
          # Includes: block patterns/templates, theme.json, built assets, `vendor/` (no dev).
          rsync -am ./ "$THEME_SLUG"/ \
            --exclude-from='.distignore' \
            --exclude='_playground/' \
            --exclude='_wordpress-org/'

          # Sanity: required files for WordPress
          test -f "$THEME_SLUG/style.css" && test -f "$THEME_SLUG/functions.php" && test -f "$THEME_SLUG/vendor/autoload.php"

          echo "Files in dist: $(find "$THEME_SLUG" -type f | wc -l)"
          zip -r "${THEME_SLUG}.zip" "$THEME_SLUG"
          unzip -l "${THEME_SLUG}.zip" | head -n 40
          echo "zip_path=${THEME_SLUG}.zip" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: aegis.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}