# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: Mark Stale Issues and Pull Requests

on:
  schedule:
    # Run daily at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          # Issue settings
          days-before-issue-stale: 90
          days-before-issue-close: 30
          stale-issue-label: 'status: stale'
          stale-issue-message: |
            [clock] This issue has been inactive for 90 days. 
            
            It will be automatically closed in 30 days if no activity is detected.
            
            **To keep this issue open:**
            - Leave a comment explaining why it is still relevant
            - Add a label or milestone to indicate work is planned
            - Update the issue if circumstances have changed
            
            Thank you for your contributions to Aegis.
          close-issue-label: 'status: closed-stale'
          close-issue-message: |
            [archive] Closing this issue due to inactivity (120 days).
            
            If this issue is still relevant, feel free to reopen it or create a new issue with the latest information.
            
            Thank you.

          # Pull Request settings
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: 'status: stale'
          stale-pr-message: |
            [clock] This pull request has been inactive for 60 days.
            
            It will be automatically closed in 14 days if no activity is detected.
            
            **To keep this PR open:**
            - Address any review feedback
            - Rebase on latest main branch
            - Leave a comment with an update
            
            Thank you for contributing to Aegis.
          close-pr-label: 'status: closed-stale'
          close-pr-message: |
            [archive] Closing this pull request due to inactivity (74 days).
            
            If you would like to revive this PR:
            1. Update your branch with the latest changes
            2. Address any review feedback
            3. Push new commits or reopen the PR
            
            Thank you.

          # Exemptions
          exempt-issue-labels: 'pinned,roadmap,epic'
          exempt-pr-labels: 'pinned,work-in-progress'
          
          # Do not mark PRs from certain users as stale (optional)
          exempt-all-pr-assignees: false
          
          # Mark only, do not close (safer approach on first setup)
          operations-per-run: 100
          
          # Do not comment on every check (only when marking/closing)
          only-labels: ''
